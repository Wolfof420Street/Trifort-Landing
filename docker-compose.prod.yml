services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trifort-builders-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - app_uploads:/app/public/uploads
    networks:
      - default
      - trifort_net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: trifort_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trifort}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trifort}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: trifort_pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-trifort}
      DB_HOST: postgres
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      LISTEN_PORT: 6433
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  app_uploads:

networks:
  default:
  trifort_net:
    external: true
    name: deploy_trifort_net
